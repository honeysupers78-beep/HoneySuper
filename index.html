<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revolucionarni sistem za merenje prinosa meda</title>

<style>
body {font-family: Arial, sans-serif; margin:0; padding:20px; background:#f4f6f8;}
.container {max-width:950px; margin:auto; background:white; padding:40px; border-radius:16px; box-shadow:0 8px 24px rgba(0,0,0,0.08);}
h1 {font-size:28px; color:#0b3d91;}
h2 {margin-top:35px; font-size:22px; color:#0b3d91;}
.badge {display:inline-block; padding:6px 14px; background:#e6ecf8; color:#0b3d91; border-radius:20px; font-size:13px; margin-bottom:20px;}
ul {padding-left:22px;}
li {margin-bottom:6px;}
select {padding:10px; border-radius:8px; margin-bottom:25px; font-size:14px;}
.button {display:inline-block; margin-top:20px; padding:14px 22px; background:#0b3d91; color:white; text-decoration:none; border-radius:10px; font-weight:bold;}
.highlight {font-weight:bold; margin:15px 0;}
</style>

<script>
const translations = {

sr:{
title:"Revolucionarni sistem za merenje prinosa meda",
intro1:"Po prvi put omogućava izdvajanje prinosa meda od ukupne mase košnice.",
features:[
"Selektivno merenje medišnog nastavka",
"Automatsko obaveštenje o trenutku vrcanja",
"Neprekidan rad (24/7) uz solarno napajanje"
],
badges:[
"Visok proizvodni profitni potencijal",
"Model teritorijalne licence",
"Patent u postupku"
],
whyTitle:"Zašto je ovo drugačije",
whyText:"Za razliku od klasičnih vaga koje mere ukupnu težinu cele košnice, ovaj sistem meri isključivo težinu medišnog nastavka (uz opciju merenja cele košnice), čime omogućava precizno praćenje stvarnog prinosa meda i pravovremeno donošenje odluke o vrcanju.",
advTitle:"Tehničke i komercijalne prednosti",
advantages:[
"Industrijski spreman dizajn",
"Standardizovana montaža i kalibracija",
"Integrisano mehaničko i elektronsko rešenje",
"Skalabilna proizvodnja"
],
coopTitle:"Model saradnje",
coopText:"Traži se teritorijalni partner za proizvodnju, distribuciju i patentnu zaštitu. Saradnja zasnovana na licenci po teritoriji, avansnom plaćanju i royalty modelu. Ekskluzivitet uz minimalne godišnje količine. Nosilac tehnologije zadržava prava u Srbiji. Dokumentacija dostupna uz NDA.",
contact:"Kontakt",
emailLabel:"Email za poslovnu saradnju",
button:"Email"
},

en:{
title:"Revolutionary Honey Yield Measurement System",
intro1:"For the first time enables separation of honey yield from total hive mass.",
features:[
"Selective honey super measurement",
"Automatic notification at harvest time",
"Continuous (24/7) solar-powered operation"
],
badges:[
"High manufacturing margin potential",
"Territorial licensing model",
"Patent pending"
],
whyTitle:"Why is this different",
whyText:"Unlike traditional scales that measure total hive weight, this system measures exclusively the honey super weight (with option of measuring full hive), enabling precise monitoring of actual honey yield and timely harvest decisions.",
advTitle:"Technical & Commercial Advantages",
advantages:[
"Industrial-ready design",
"Standardized assembly and calibration",
"Integrated mechanical and electronic solution",
"Scalable production"
],
coopTitle:"Cooperation Model",
coopText:"Seeking territorial partner for manufacturing, distribution and patent protection. Cooperation based on territorial license, advance payment and royalty model. Exclusivity with minimum annual volumes. Technology holder retains rights in Serbia. Documentation available under NDA.",
contact:"Contact",
emailLabel:"Business inquiry email",
button:"Email"
}

};

function applyLanguage(lang){
const t = translations[lang] || translations["sr"];
document.getElementById("title").innerText = t.title;
document.getElementById("intro1").innerText = t.intro1;

let features="";
t.features.forEach(f=>features+="<li>✔ "+f+"</li>");
document.getElementById("features").innerHTML=features;

let badges="";
t.badges.forEach(b=>badges+="<div class='highlight'>"+b+"</div>");
document.getElementById("badges").innerHTML=badges;

document.getElementById("whyTitle").innerText=t.whyTitle;
document.getElementById("whyText").innerText=t.whyText;
document.getElementById("advTitle").innerText=t.advTitle;

let adv="";
t.advantages.forEach(a=>adv+="<li>"+a+"</li>");
document.getElementById("advantages").innerHTML=adv;

document.getElementById("coopTitle").innerText=t.coopTitle;
document.getElementById("coopText").innerText=t.coopText;
document.getElementById("contactTitle").innerText=t.contact;
document.getElementById("emailLabel").innerText=t.emailLabel;
document.getElementById("emailButton").innerText=t.button;
}

window.onload=function(){applyLanguage("sr");};
</script>
</head>

<body>
<div class="container">

<select onchange="applyLanguage(this.value)">
<option value="sr">Srpski</option>
<option value="en">English</option>
</select>

<h1 id="title"></h1>
<p id="intro1"></p>

<ul id="features"></ul>

<div id="badges"></div>

<h2 id="whyTitle"></h2>
<p id="whyText"></p>

<h2 id="advTitle"></h2>
<ul id="advantages"></ul>

<h2 id="coopTitle"></h2>
<p id="coopText"></p>

<h2 id="contactTitle"></h2>
<p id="emailLabel"></p>

<a id="emailButton" class="button" href="mailto:honeysupers78@gmail.com?subject=Business%20Inquiry%20-%20Licensing">
Email
</a>

<p style="margin-top:20px;">
honeysupers78@gmail.com
</p>

</div>
</body>
</html>
